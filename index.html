<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设施蔬菜碳排放平台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background-color: #f8fafc;
            color: #333;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 40px 0;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            border-radius: 15px;
            color: white;
            box-shadow: 0 10px 30px rgba(34, 197, 94, 0.3);
        }
        
        header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
        }
        
        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }
        
        .calculator {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 35px;
            margin-bottom: 30px;
        }
        
        .calculator h2 {
            color: #16a34a;
            margin-bottom: 25px;
            font-size: 1.5em;
            border-bottom: 3px solid #22c55e;
            padding-bottom: 10px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        
        .form-item {
            flex: 1;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #4b5563;
            font-size: 0.95em;
        }
        
        select,
        input[type="number"],
        input[type="password"] {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
            background-color: #fafafa;
        }
        
        select:focus,
        input[type="number"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #22c55e;
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.1);
            background-color: white;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
        }
        
        .results {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 35px;
        }
        
        .results h2 {
            color: #16a34a;
            margin-bottom: 25px;
            font-size: 1.5em;
            border-bottom: 3px solid #22c55e;
            padding-bottom: 10px;
        }
        
        .result-item {
            background: #f8fafc;
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 20px;
            border-left: 5px solid #e5e7eb;
        }
        
        .result-item h3 {
            color: #1f2937;
            margin-bottom: 15px;
            font-size: 1.2em;
        }
        
        .result-value {
            font-size: 2.5em;
            font-weight: bold;
            color: #22c55e;
            margin-bottom: 5px;
        }
        
        .result-unit {
            color: #6b7280;
            font-size: 1em;
        }
        
        .result-details {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .detail-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        .detail-label {
            color: #6b7280;
            font-weight: 500;
        }
        
        .detail-value {
            font-weight: 600;
            color: #1f2937;
        }
        
        .password-section {
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            padding: 60px 40px;
            max-width: 450px;
            margin: 100px auto;
            text-align: center;
        }
        
        .password-section h2 {
            color: #16a34a;
            margin-bottom: 30px;
            font-size: 1.8em;
        }
        
        .password-section p {
            color: #6b7280;
            margin-bottom: 30px;
        }
        
        .password-section .form-item {
            margin-bottom: 25px;
        }
        
        #calculator-section {
            display: none;
        }
        
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            
            .result-details {
                grid-template-columns: 1fr;
            }
            
            header h1 {
                font-size: 1.8em;
            }
            
            .password-section {
                margin: 50px auto;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="password-section" class="password-section">
            <h2>设施蔬菜碳排放平台</h2>
            <p>请输入访问密码以使用本平台</p>
            <div class="form-item">
                <label for="accessPassword">访问密码</label>
                <input type="password" id="accessPassword" placeholder="请输入密码">
            </div>
            <button onclick="checkPassword()">登录</button>
        </div>
        
        <div id="calculator-section">
            <header>
                <h1>设施蔬菜碳排放平台</h1>
                <p>基于国家温室气体排放因子数据库（第二版）与T/ZGCERIS 0003-2024标准开发</p>
            </header>
            
            <div class="calculator">
                <h2>碳排放核算参数</h2>
                <form id="carbonForm">
                    <div class="form-row">
                        <div class="form-item">
                            <label for="cropType">作物类型</label>
                            <select id="cropType">
                                <option value="tomato">番茄</option>
                                <option value="cucumber">黄瓜</option>
                                <option value="eggplant">茄子</option>
                                <option value="pepper">辣椒</option>
                                <option value="lettuce">生菜</option>
                                <option value="celery">芹菜</option>
                                <option value="strawberry">草莓</option>
                                <option value="melon">甜瓜</option>
                            </select>
                        </div>
                        <div class="form-item">
                            <label for="region">种植区域</label>
                            <select id="region">
                                <option value="north">北方地区</option>
                                <option value="south">南方地区</option>
                                <option value="northwest">西北地区</option>
                                <option value="northeast">东北地区</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-item">
                            <label for="area">种植面积（亩）</label>
                            <input type="number" id="area" step="0.1" placeholder="请输入种植面积">
                        </div>
                        <div class="form-item">
                            <label for="yield">总产量（公斤）</label>
                            <input type="number" id="yield" step="1" placeholder="建议产量：4500公斤/亩">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-item">
                            <label for="fertilizer">化肥用量（公斤/亩）</label>
                            <input type="number" id="fertilizer" step="0.1" placeholder="建议化肥用量：520公斤/亩">
                        </div>
                        <div class="form-item">
                            <label for="pesticide">农药用量（公斤/亩）</label>
                            <input type="number" id="pesticide" step="0.1" placeholder="建议农药用量：8公斤/亩">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-item">
                            <label for="irrigation">灌溉用水（立方米/亩）</label>
                            <input type="number" id="irrigation" step="1" placeholder="建议灌溉用水：520立方米/亩">
                        </div>
                        <div class="form-item">
                            <label for="diesel">柴油用量（升/亩）</label>
                            <input type="number" id="diesel" step="0.1" placeholder="建议柴油用量：15升/亩">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-item">
                            <label for="plasticFilm">农膜用量（公斤/亩）</label>
                            <input type="number" id="plasticFilm" step="0.1" placeholder="建议农膜用量：90公斤/亩">
                        </div>
                    </div>
                    
                    <button type="submit">计算碳排放</button>
                </form>
            </div>
            
            <div class="results" id="results">
                <h2>计算结果将显示在这里</h2>
                <p style="color: #6b7280; text-align: center; padding: 40px;">请输入参数并点击"计算碳排放"按钮</p>
            </div>
        </div>
    </div>
    
    <script src="calculator.js"></script>
</body>
</html>
